{% extends "base.html" %}

{% block title %}Login - Employee Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Role Based Login</h3>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <div class="mt-3 small text-muted">
                    <div><strong>Manager:</strong> manager / manager123</div>
                    <div><strong>HR:</strong> hr / hr123</div>
                    <div><strong>Employee:</strong> employee / employee123</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
