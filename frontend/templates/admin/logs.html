{% extends "base.html" %}
{% block title %}Activity Logs{% endblock %}

{% block content %}
<h2 class="mb-3">Activity Logs</h2>
<div class="table-responsive">
<table class="table table-bordered table-striped">
    <thead><tr><th>Time</th><th>User ID</th><th>Action</th></tr></thead>
    <tbody>
        {% for l in logs %}
        <tr><td>{{ l.timestamp }}</td><td>{{ l.user_id }}</td><td>{{ l.action }}</td></tr>
        {% else %}
        <tr><td colspan="3" class="text-center text-muted">No logs found.</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
