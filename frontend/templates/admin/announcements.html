{% extends "base.html" %}
{% block title %}Announcements{% endblock %}

{% block content %}
<h2 class="mb-3">Post Announcements</h2>
<div class="card p-3 mb-4">
    <form method="POST" class="row g-2">
        <div class="col-md-4"><input class="form-control" name="title" placeholder="Title" required></div>
        <div class="col-md-6"><input class="form-control" name="content" placeholder="Announcement content" required></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Post</button></div>
    </form>
</div>

<div class="list-group">
    {% for a in items %}
    <div class="list-group-item">
        <div class="fw-bold">{{ a.title }}</div>
        <div>{{ a.content }}</div>
        <small class="text-muted">{{ a.date }}</small>
    </div>
    {% else %}
    <div class="text-muted">No announcements yet.</div>
    {% endfor %}
</div>
{% endblock %}
