{% extends "base.html" %}

{% block title %}Edit Employee - Employee Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-4">Edit Employee</h3>

                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" class="form-control" name="full_name" value="{{ employee.full_name }}" required></div>
                        <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" value="{{ employee.email }}" required></div>
                        <div class="col-md-6"><label class="form-label">Phone</label><input type="text" class="form-control" name="phone" value="{{ employee.phone }}" required></div>
                        <div class="col-md-6"><label class="form-label">Department</label><input type="text" class="form-control" name="department" value="{{ employee.department }}" required></div>
                        <div class="col-md-6"><label class="form-label">Designation</label><input type="text" class="form-control" name="designation" value="{{ employee.designation }}" required></div>
                        <div class="col-md-6"><label class="form-label">Salary</label><input type="number" step="0.01" min="0" class="form-control" name="salary" value="{{ employee.salary }}" required></div>
                        <div class="col-md-6"><label class="form-label">Joining Date</label><input type="date" class="form-control" name="joining_date" value="{{ employee.joining_date }}" required></div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update Employee</button>
                        <a href="{{ url_for('employees') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
