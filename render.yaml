services:
  - type: web
    name: employee-management-system
    env: python
    region: oregon
    plan: free
    runtime: python-3.13
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 4 --worker-class sync --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
